<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tower of Hanoi · 3D Learning Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header & Controls -->
        <header class="game-header">
            <h1>🏯 Tower of Hanoi (3D)</h1>
            <div class="controls-panel">
                <div class="control-group">
                    <label for="diskCount">Number of Disks:</label>
                    <input type="number" id="diskCount" min="3" max="8" value="4">
                </div>
                <div class="control-group">
                    <span class="moves-counter">Moves: <strong id="movesCount">0</strong></span>
                </div>
                <div class="control-group buttons">
                    <button id="resetBtn" class="btn">Reset Game</button>
                    <button id="autoSolveBtn" class="btn btn-primary">Auto Solve</button>
                </div>
            </div>
        </header>

        <!-- Game Board -->
        <main class="game-board" id="gameBoard">
            <!-- Pegs will be generated here by JavaScript -->
            <!-- Each peg contains a 'rod' and a 'base' -->
            <!-- Disks will be appended here -->
        </main>

        <!-- Status / Message Area -->
        <footer class="status-bar">
            <p id="messageArea">Select the top disk from a peg and move it to another.</p >
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
